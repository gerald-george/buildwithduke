name = "buildwithduke"
compatibility_date = "2026-07-17"
pages_build_output_dir = "apps/web/build/client"

# Cloudflare can execute this from the repository root when dashboard build
# settings are empty. The checked-in command keeps the monorepo build explicit.
[build]
command = "pnpm build"
cwd = "."
watch_dir = "apps/web/src"
