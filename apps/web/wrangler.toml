name = "buildwithduke"
compatibility_date = "2026-07-17"
pages_build_output_dir = "build/client"

# Makes this app configuration self-building when Cloudflare dashboard build
# fields are empty. Paths are resolved from this app directory.
[build]
command = "pnpm build"
cwd = "../.."
watch_dir = "apps/web/src"

[[d1_databases]]
binding = "DB"
database_name = "buildwithduke"
database_id = "replace-after-wrangler-d1-create"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "buildwithduke-media"

[[kv_namespaces]]
binding = "CACHE"
id = "replace-after-kv-create"
